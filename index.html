<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Grammar Island 🏝️</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏝️</text></svg>">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- the island world: a fixed vector scene behind every screen -->
  <div id="scene" aria-hidden="true">
    <svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMax slice">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#cdeff9"/><stop offset="1" stop-color="#9fdff0"/>
        </linearGradient>
        <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#4cc5df"/><stop offset="1" stop-color="#0b7f9e"/>
        </linearGradient>
        <!-- one spiky coconut frond; the crown reuses it rotated -->
        <path id="frond" d="M0 0 C26 -18 60 -26 92 -16 L78 -8 L86 2 L64 -4 L70 8 L46 -2 L50 10 L28 0 L30 10 L12 1 L12 8 C6 4 2 2 0 0 Z"/>
        <g id="crown">
          <use href="#frond" transform="rotate(-8)"/>
          <use href="#frond" transform="rotate(24) scale(.9)"/>
          <use href="#frond" transform="rotate(56) scale(.78)"/>
          <use href="#frond" transform="rotate(-40) scale(.95)"/>
          <use href="#frond" transform="rotate(-72) scale(.82)"/>
          <use href="#frond" transform="scale(-1 1) rotate(-6) scale(.95)"/>
          <use href="#frond" transform="scale(-1 1) rotate(-38) scale(.85)"/>
          <use href="#frond" transform="scale(-1 1) rotate(28) scale(.78)"/>
        </g>
      </defs>
      <rect width="1200" height="800" fill="url(#sky)"/>
      <!-- sun -->
      <circle cx="1040" cy="110" r="95" fill="#ffd25e" opacity=".22"/>
      <circle cx="1040" cy="110" r="58" fill="#ffd25e" opacity=".9"/>
      <!-- clouds -->
      <ellipse cx="250" cy="120" rx="95" ry="26" fill="#ffffff" opacity=".7"/>
      <ellipse cx="320" cy="142" rx="70" ry="20" fill="#ffffff" opacity=".5"/>
      <ellipse cx="740" cy="85" rx="85" ry="22" fill="#ffffff" opacity=".55"/>
      <!-- the sea -->
      <rect y="430" width="1200" height="370" fill="url(#sea)"/>
      <path d="M0 430 Q150 412 300 430 T600 430 T900 430 T1200 430 V468 Q1050 450 900 468 T600 468 T300 468 T0 468 Z" fill="#8fdcec" opacity=".55"/>
      <path d="M0 560 Q100 546 200 560 T400 560 T600 560 T800 560 T1000 560 T1200 560" stroke="#c8f1fa" stroke-width="6" fill="none" opacity=".32"/>
      <path d="M0 665 Q100 651 200 665 T400 665 T600 665 T800 665 T1000 665 T1200 665" stroke="#c8f1fa" stroke-width="6" fill="none" opacity=".22"/>
      <!-- left island: bright twin coconut palms on a green mound -->
      <ellipse cx="160" cy="810" rx="340" ry="125" fill="#f2dfa7"/>
      <ellipse cx="160" cy="828" rx="340" ry="112" fill="#e6cd8c" opacity=".65"/>
      <g fill="#63bb3f">
        <path d="M0 800 Q170 692 355 800 Z"/>
        <path d="M200 798 C190 720 172 640 148 560 L128 566 C156 644 170 722 172 798 Z"/>
        <path d="M280 798 C276 748 272 708 262 668 L246 672 C258 710 258 752 256 798 Z"/>
        <use href="#crown" transform="translate(138 558) scale(1.05)"/>
        <use href="#crown" transform="translate(254 664) scale(.55)"/>
      </g>
      <!-- right island: dark-trunk coconut palm with deep green crown -->
      <ellipse cx="1110" cy="812" rx="230" ry="85" fill="#f2dfa7"/>
      <g>
        <path d="M960 808 Q1100 754 1246 810 Q1160 794 1088 802 Q1016 812 960 808 Z" fill="#16324e"/>
        <path d="M1112 804 C1102 730 1082 660 1052 600 L1034 610 C1064 668 1080 736 1082 804 Z" fill="#16324e"/>
        <use href="#crown" transform="translate(1046 588) scale(.95)" fill="#1d6b45"/>
      </g>
    </svg>
  </div>
  <div id="app" aria-live="polite"></div>

  <!-- data -->
  <script src="js/data/curriculum.js"></script>
  <script src="js/data/bank-noun-naming.js"></script>
  <script src="js/data/bank-noun-proper.js"></script>
  <script src="js/data/bank-pronoun-personal.js"></script>
  <script src="js/data/bank-articles.js"></script>
  <!-- engine -->
  <script src="js/state.js"></script>
  <script src="js/background.js"></script>
  <script src="js/mastery.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/games.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
